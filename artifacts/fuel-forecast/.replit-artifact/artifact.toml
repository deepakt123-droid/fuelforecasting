kind = "web"
previewPath = "/"
title = "Fuel Price Trend Forecasting System"
version = "1.0.0"
id = "artifacts/fuel-forecast"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24646

[services.development]
run = "pnpm --filter @workspace/fuel-forecast run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fuel-forecast", "run", "build" ]
publicDir = "artifacts/fuel-forecast/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24646"
BASE_PATH = "/"
